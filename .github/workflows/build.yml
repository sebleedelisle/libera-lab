name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            preset: release
            artifact: libera-lab-macos
          - os: windows-latest
            preset: win-release
            artifact: libera-lab-windows

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install libusb ninja create-dmg 2>/dev/null

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: cmake --preset ${{ matrix.preset }}

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build build --config Release

      # ---- macOS code signing & notarization ----

      - name: Import Apple certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Bundle libusb into app (macOS)
        if: runner.os == 'macOS'
        run: |
          # Find where libusb is linked from
          LIBUSB_PATH=$(otool -L build/libera-lab.app/Contents/MacOS/libera-lab | grep libusb | awk '{print $1}')
          echo "Current libusb path: $LIBUSB_PATH"

          # Copy libusb into the Frameworks folder inside the app bundle
          mkdir -p build/libera-lab.app/Contents/Frameworks
          cp "$(brew --prefix libusb)/lib/libusb-1.0.0.dylib" build/libera-lab.app/Contents/Frameworks/

          # Rewrite the executable to look for libusb inside the bundle
          install_name_tool -change "$LIBUSB_PATH" \
            @executable_path/../Frameworks/libusb-1.0.0.dylib \
            build/libera-lab.app/Contents/MacOS/libera-lab

          # Fix the dylib's own ID
          install_name_tool -id @executable_path/../Frameworks/libusb-1.0.0.dylib \
            build/libera-lab.app/Contents/Frameworks/libusb-1.0.0.dylib

          # Verify
          echo "Updated library paths:"
          otool -L build/libera-lab.app/Contents/MacOS/libera-lab | grep libusb

      - name: Sign app bundle
        if: runner.os == 'macOS'
        run: |
          # Sign the bundled dylib first, then the app
          codesign --force --options runtime \
            --sign "Developer ID Application: Seb Lee-Delisle (${{ secrets.APPLE_TEAM_ID }})" \
            build/libera-lab.app/Contents/Frameworks/libusb-1.0.0.dylib

          codesign --deep --force --options runtime \
            --sign "Developer ID Application: Seb Lee-Delisle (${{ secrets.APPLE_TEAM_ID }})" \
            build/libera-lab.app

          # Verify
          codesign --verify --verbose build/libera-lab.app

      - name: Notarize app
        if: runner.os == 'macOS'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Create a zip for notarization submission
          ditto -c -k --keepParent build/libera-lab.app $RUNNER_TEMP/libera-lab-notarize.zip

          # Submit for notarization and wait
          xcrun notarytool submit $RUNNER_TEMP/libera-lab-notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          # Staple the notarization ticket to the app
          xcrun stapler staple build/libera-lab.app

      - name: Package DMG (macOS)
        if: runner.os == 'macOS'
        run: |
          # Rename app bundle to have a nice display name in the DMG
          mv build/libera-lab.app "build/Libera Lab.app"

          # create-dmg returns exit code 2 if it can't set Finder layout
          # (common on CI runners without a GUI session) — the DMG is still valid
          create-dmg \
            --volname "Libera Lab" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Libera Lab.app" 150 190 \
            --app-drop-link 450 190 \
            --no-internet-enable \
            "libera-lab-macos.dmg" \
            "build/Libera Lab.app" || true

          # Verify the DMG was created
          test -f libera-lab-macos.dmg

          # Sign the DMG too
          codesign --force --sign "Developer ID Application: Seb Lee-Delisle (${{ secrets.APPLE_TEAM_ID }})" \
            libera-lab-macos.dmg

      # ---- Windows code signing & packaging ----

      - name: Install CodeSignTool (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          # Download with redirect following
          $url = "https://www.ssl.com/download/codesigntool-for-windows/"
          $wc = New-Object System.Net.WebClient
          $wc.DownloadFile($url, "CodeSignTool.zip")

          # If that didn't work (HTML page), try the known direct URL
          $fileSize = (Get-Item "CodeSignTool.zip").Length
          if ($fileSize -lt 1000000) {
            Write-Host "First download attempt returned small file ($fileSize bytes), trying direct URL..."
            Invoke-WebRequest -Uri "https://www.ssl.com/download/codesigntool-for-windows/" -OutFile "CodeSignTool.zip" -MaximumRedirection 10
          }

          Expand-Archive -Path "CodeSignTool.zip" -DestinationPath "CodeSignTool" -Force

          # Find and report the bat file location
          $cst = Get-ChildItem -Path "CodeSignTool" -Recurse -Filter "CodeSignTool.bat" | Select-Object -First 1
          if ($cst) {
            Write-Host "Found CodeSignTool at: $($cst.FullName)"
            echo "CST_PATH=$($cst.FullName)" >> $env:GITHUB_ENV
          } else {
            Write-Host "CodeSignTool.bat not found! Contents of CodeSignTool directory:"
            Get-ChildItem -Path "CodeSignTool" -Recurse | Select-Object FullName
            exit 1
          }

      - name: Sign executable (Windows)
        if: runner.os == 'Windows'
        timeout-minutes: 5
        shell: powershell
        run: |
          Write-Host "CodeSignTool path: $env:CST_PATH"
          $cstDir = Split-Path $env:CST_PATH
          Write-Host "CodeSignTool directory contents:"
          Get-ChildItem $cstDir | ForEach-Object { Write-Host "  $_" }
          Write-Host "Input file exists: $(Test-Path 'build\Release\libera-lab.exe')"

          # Run from the CodeSignTool directory so it can find its jre
          Push-Location $cstDir
          & .\CodeSignTool.bat sign `
            "-username=$env:SSLCOM_USERNAME" `
            "-password=$env:SSLCOM_PASSWORD" `
            "-credential_id=$env:SSLCOM_CREDENTIAL_ID" `
            "-totp_secret=$env:SSLCOM_TOTP_SECRET" `
            "-input_file_path=$env:GITHUB_WORKSPACE\build\Release\libera-lab.exe" `
            "-override=true"
          $exitCode = $LASTEXITCODE
          Pop-Location

          if ($exitCode -ne 0) {
            Write-Error "Code signing failed with exit code $exitCode"
            exit 1
          }

          # Verify the signature was applied
          $sig = Get-AuthenticodeSignature "build\Release\libera-lab.exe"
          if ($sig.Status -ne "Valid") {
            Write-Error "Signature verification failed: $($sig.Status)"
            exit 1
          }
          Write-Host "Signature verified: $($sig.SignerCertificate.Subject)"
        env:
          SSLCOM_USERNAME: ${{ secrets.SSLCOM_USERNAME }}
          SSLCOM_PASSWORD: ${{ secrets.SSLCOM_PASSWORD }}
          SSLCOM_CREDENTIAL_ID: ${{ secrets.SSLCOM_CREDENTIAL_ID }}
          SSLCOM_TOTP_SECRET: ${{ secrets.SSLCOM_TOTP_SECRET }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p staging/libera-lab
          cp build/Release/libera-lab.exe staging/libera-lab/
          cp -r build/patterns staging/libera-lab/ || cp -r build/Release/patterns staging/libera-lab/ || true
          # Bundle libusb DLL
          cp libs/libera-core/libs/helios_dac/sdk/cpp/libusb_bin/Windows/x64/Release/dll/libusb-1.0.dll staging/libera-lab/ || true
          cd staging && 7z a ../libera-lab-windows.zip libera-lab

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.${{ runner.os == 'macOS' && 'dmg' || 'zip' }}

      # ---- Cleanup ----

      - name: Cleanup keychain
        if: runner.os == 'macOS' && always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            libera-lab-macos/libera-lab-macos.dmg
            libera-lab-windows/libera-lab-windows.zip
          generate_release_notes: true

      - name: Update public downloads page
        env:
          RELEASES_PAT: ${{ secrets.RELEASES_PAT }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          DATE=$(date -u +"%Y-%m-%d")
          RELEASE_URL="https://github.com/sebleedelisle/libera-lab/releases/download/${VERSION}"

          # Clone the releases repo
          git clone https://x-access-token:${RELEASES_PAT}@github.com/sebleedelisle/libera-lab-releases.git releases-repo
          cd releases-repo

          # Copy the artifacts into public/downloads/<version>/
          mkdir -p "public/downloads/${VERSION}"
          cp ../libera-lab-macos/libera-lab-macos.dmg "public/downloads/${VERSION}/" || true
          cp ../libera-lab-windows/libera-lab-windows.zip "public/downloads/${VERSION}/" || true

          # Update releases.json — prepend the new release
          python3 -c "
          import json
          with open('public/releases.json') as f:
              releases = json.load(f)
          new = {
              'version': '${VERSION}',
              'date': '${DATE}',
              'macos': 'downloads/${VERSION}/libera-lab-macos.dmg',
              'windows': 'downloads/${VERSION}/libera-lab-windows.zip'
          }
          releases = [r for r in releases if r['version'] != '${VERSION}']
          releases.insert(0, new)
          with open('public/releases.json', 'w') as f:
              json.dump(releases, f, indent=2)
          "

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Release ${VERSION}" || echo "No changes to commit"
          git push
