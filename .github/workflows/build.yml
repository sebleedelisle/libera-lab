name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            preset: release
            artifact: libera-lab-macos
          - os: windows-latest
            preset: win-release
            artifact: libera-lab-windows

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install libusb ninja

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: cmake --preset ${{ matrix.preset }}

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build build --config Release

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p staging/libera-lab
          cp build/libera-lab staging/libera-lab/
          cp -r build/patterns staging/libera-lab/
          cd staging && zip -r ../libera-lab-macos.zip libera-lab

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p staging/libera-lab
          cp build/Release/libera-lab.exe staging/libera-lab/
          cp -r build/patterns staging/libera-lab/ || cp -r build/Release/patterns staging/libera-lab/ || true
          # Bundle libusb DLL
          cp libs/libera-core/libs/helios_dac/sdk/cpp/libusb_bin/Windows/x64/Release/dll/libusb-1.0.dll staging/libera-lab/ || true
          cd staging && 7z a ../libera-lab-windows.zip libera-lab

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            libera-lab-macos/libera-lab-macos.zip
            libera-lab-windows/libera-lab-windows.zip
          generate_release_notes: true
