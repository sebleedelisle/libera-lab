name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            preset: release
            artifact: libera-lab-macos
            pr_artifact_paths: |
              build/libera-lab.app
            package_path: libera-lab-macos.dmg
          - os: ubuntu-latest
            preset: linux-release
            artifact: libera-lab-linux
            pr_artifact_paths: |
              build/libera-lab
            package_path: libera-lab-linux.AppImage
          - os: windows-latest
            preset: win-release
            artifact: libera-lab-windows
            pr_artifact_paths: |
              build/Release/libera-lab.exe
            package_path: libera-lab-windows.zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew list ninja >/dev/null 2>&1 || brew install ninja

      - name: Install packaging dependencies (macOS)
        if: runner.os == 'macOS' && github.event_name != 'pull_request'
        run: |
          brew list create-dmg >/dev/null 2>&1 || brew install create-dmg

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libusb-1.0-0-dev \
            libgl-dev libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev libxkbcommon-dev \
            libwayland-dev wayland-protocols libdecor-0-dev

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build build --config Release --parallel

      # ---- macOS code signing & notarization ----

      - name: Import Apple certificate
        if: runner.os == 'macOS' && github.event_name != 'pull_request'
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Bundle libusb into app (macOS)
        if: runner.os == 'macOS' && github.event_name != 'pull_request'
        run: |
          # Find where libusb is linked from (the binary may contain duplicate
          # LC_LOAD_DYLIB entries — dedupe so we don't pass a multi-line string
          # to install_name_tool, which would silently match nothing).
          LIBUSB_PATH=$(otool -L build/libera-lab.app/Contents/MacOS/libera-lab | grep libusb | awk '{print $1}' | sort -u)
          echo "Current libusb path: $LIBUSB_PATH"

          # Copy bundled universal libusb into the Frameworks folder
          mkdir -p build/libera-lab.app/Contents/Frameworks
          cp libs/libera-core/libs/helios_dac/sdk/cpp/libusb_bin/macOS/libusb-1.0.0.dylib build/libera-lab.app/Contents/Frameworks/

          # Rewrite the executable to look for libusb inside the bundle.
          # install_name_tool -change replaces all matching LC_LOAD_DYLIB entries.
          install_name_tool -change "$LIBUSB_PATH" \
            @executable_path/../Frameworks/libusb-1.0.0.dylib \
            build/libera-lab.app/Contents/MacOS/libera-lab

          # Verify the rewrite actually happened — fail the build if libusb
          # still resolves via @rpath (which would crash on end-user machines
          # since the only baked-in rpath points at the CI runner's filesystem).
          if otool -L build/libera-lab.app/Contents/MacOS/libera-lab | grep -q '@rpath/libusb'; then
            echo "ERROR: libusb is still referenced via @rpath after install_name_tool"
            otool -L build/libera-lab.app/Contents/MacOS/libera-lab | grep libusb
            exit 1
          fi

          # Fix the dylib's own ID
          install_name_tool -id @executable_path/../Frameworks/libusb-1.0.0.dylib \
            build/libera-lab.app/Contents/Frameworks/libusb-1.0.0.dylib

          # Verify
          echo "Updated library paths:"
          otool -L build/libera-lab.app/Contents/MacOS/libera-lab | grep libusb

      - name: Sign app bundle
        if: runner.os == 'macOS' && github.event_name != 'pull_request'
        run: |
          # Sign the bundled dylib first, then the app
          codesign --force --options runtime \
            --sign "Developer ID Application: Seb Lee-Delisle (${{ secrets.APPLE_TEAM_ID }})" \
            build/libera-lab.app/Contents/Frameworks/libusb-1.0.0.dylib

          codesign --deep --force --options runtime \
            --sign "Developer ID Application: Seb Lee-Delisle (${{ secrets.APPLE_TEAM_ID }})" \
            build/libera-lab.app

          # Verify
          codesign --verify --verbose build/libera-lab.app

      - name: Notarize app
        if: runner.os == 'macOS' && github.event_name != 'pull_request'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Create a zip for notarization submission
          ditto -c -k --keepParent build/libera-lab.app "$RUNNER_TEMP/libera-lab-notarize.zip"

          # Submit for notarization and wait
          xcrun notarytool submit "$RUNNER_TEMP/libera-lab-notarize.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          # Staple the notarization ticket to the app
          xcrun stapler staple build/libera-lab.app

      - name: Package DMG (macOS)
        if: runner.os == 'macOS' && github.event_name != 'pull_request'
        run: |
          # Rename app bundle to have a nice display name in the DMG
          mv build/libera-lab.app "build/Libera Lab.app"

          # create-dmg returns exit code 2 if it can't set Finder layout
          # (common on CI runners without a GUI session) — the DMG is still valid
          create-dmg \
            --volname "Libera Lab" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Libera Lab.app" 150 190 \
            --app-drop-link 450 190 \
            --no-internet-enable \
            "libera-lab-macos.dmg" \
            "build/Libera Lab.app" || true

          # Verify the DMG was created
          test -f libera-lab-macos.dmg

          # Sign the DMG too
          codesign --force --sign "Developer ID Application: Seb Lee-Delisle (${{ secrets.APPLE_TEAM_ID }})" \
            libera-lab-macos.dmg

      # ---- Windows code signing & packaging ----

      - name: Sign executable (Windows)
        if: runner.os == 'Windows' && github.event_name != 'pull_request'
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id: ${{ vars.AZURE_TENANT_ID }}
          azure-client-id: ${{ vars.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ vars.AZURE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.AZURE_CODE_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ vars.AZURE_CERT_PROFILE_NAME }}
          files-folder: build/Release
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Package AppImage (Linux)
        if: runner.os == 'Linux' && github.event_name != 'pull_request'
        run: |
          sudo apt-get install -y imagemagick

          # Extract a 256x256 PNG from the existing .ico (it already contains
          # a PNG at index 0) so we don't need a separate source image.
          convert 'icons/libera-lab.ico[0]' libera-lab.png

          # The .desktop file tells Linux desktop environments how to launch
          # and display the app. Exec/Icon names must match the files below.
          # (sed strips the YAML indentation — .desktop keys must be flush-left.)
          sed 's/^          //' > libera-lab.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Libera Lab
          Comment=Laser DAC control and testing
          Exec=libera-lab
          Icon=libera-lab
          Categories=Graphics;AudioVideo;
          Terminal=false
          EOF

          # linuxdeploy is the standard tool for turning a binary + metadata
          # into an AppImage. It also auto-bundles the binary's shared library
          # dependencies (incl. libusb) so end users need nothing preinstalled.
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          export APPIMAGE_EXTRACT_AND_RUN=1

          # Populate AppDir (copies executable + ldd deps into AppDir/usr/lib).
          ./linuxdeploy-x86_64.AppImage --appdir AppDir \
            --executable build/libera-lab \
            --desktop-file libera-lab.desktop \
            --icon-file libera-lab.png

          # ILDA patterns are loaded at runtime from ./patterns/ relative to
          # the executable, so ship them next to it inside the AppDir.
          cp -r build/patterns AppDir/usr/bin/ || true

          # Produce the final single-file AppImage.
          export OUTPUT=libera-lab-linux.AppImage
          ./linuxdeploy-x86_64.AppImage --appdir AppDir --output appimage

      - name: Package (Windows)
        if: runner.os == 'Windows' && github.event_name != 'pull_request'
        shell: bash
        run: |
          mkdir -p staging/libera-lab
          cp build/Release/libera-lab.exe staging/libera-lab/
          cp -r build/patterns staging/libera-lab/ || cp -r build/Release/patterns staging/libera-lab/ || true
          # Bundle libusb DLL
          cp libs/libera-core/libs/helios_dac/sdk/cpp/libusb_bin/Windows/x64/Release/dll/libusb-1.0.dll staging/libera-lab/ || true
          cd staging && 7z a ../libera-lab-windows.zip libera-lab

      - name: Upload PR build artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}-ci
          if-no-files-found: error
          path: ${{ matrix.pr_artifact_paths }}

      - name: Upload packaged artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          path: ${{ matrix.package_path }}

      # ---- Cleanup ----

      - name: Cleanup keychain
        if: runner.os == 'macOS' && github.event_name != 'pull_request' && always()
        run: security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            libera-lab-macos/libera-lab-macos.dmg
            libera-lab-linux/libera-lab-linux.AppImage
            libera-lab-windows/libera-lab-windows.zip
          generate_release_notes: true

      - name: Update public downloads page
        env:
          RELEASES_PAT: ${{ secrets.RELEASES_PAT }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          DATE=$(date -u +"%Y-%m-%d")

          # Clone the releases repo
          git clone "https://x-access-token:${RELEASES_PAT}@github.com/sebleedelisle/libera-lab-releases.git" releases-repo
          cd releases-repo

          # Copy the artifacts into public/downloads/<version>/
          mkdir -p "public/downloads/${VERSION}"
          cp ../libera-lab-macos/libera-lab-macos.dmg "public/downloads/${VERSION}/" || true
          cp ../libera-lab-linux/libera-lab-linux.AppImage "public/downloads/${VERSION}/" || true
          cp ../libera-lab-windows/libera-lab-windows.zip "public/downloads/${VERSION}/" || true

          # Update releases.json — prepend the new release
          python3 -c "
          import json
          with open('public/releases.json') as f:
              releases = json.load(f)
          new = {
              'version': '${VERSION}',
              'date': '${DATE}',
              'macos': 'downloads/${VERSION}/libera-lab-macos.dmg',
              'linux': 'downloads/${VERSION}/libera-lab-linux.AppImage',
              'windows': 'downloads/${VERSION}/libera-lab-windows.zip'
          }
          releases = [r for r in releases if r['version'] != '${VERSION}']
          releases.insert(0, new)
          with open('public/releases.json', 'w') as f:
              json.dump(releases, f, indent=2)
          "

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Release ${VERSION}" || echo "No changes to commit"
          git push
